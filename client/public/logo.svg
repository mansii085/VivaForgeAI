<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="vLeft" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9d4edd" />
      <stop offset="50%" stop-color="#7209b7" />
      <stop offset="100%" stop-color="#3a0ca3" />
    </linearGradient>
    <linearGradient id="vRight" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#023e8a" />
      <stop offset="50%" stop-color="#0077b6" />
      <stop offset="100%" stop-color="#00b4d8" />
    </linearGradient>
    <linearGradient id="circuit" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f5d4" />
      <stop offset="100%" stop-color="#00b4d8" />
    </linearGradient>
  </defs>

  <g transform="translate(10, 20)">
    <!-- Left arm of V -->
    <path d="M 110 150 L 250 430 L 295 430 L 165 150 Z" fill="url(#vLeft)" />

    <!-- Person Head -->
    <circle cx="235" cy="180" r="28" fill="#7209b7" />

    <!-- Person Body (Right arm of V inner) -->
    <path d="M 270 430 Q 300 300 350 120 Q 320 200 240 260 Q 230 350 270 430 Z" fill="url(#vRight)" />

    <!-- Circuit traces (cyan) branching out from the right side -->
    <!-- Trace 1 (Top) -->
    <path d="M 320 190 L 390 190 L 420 160" fill="none" stroke="#00f5d4" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="420" cy="160" r="6" fill="#00f5d4" />

    <!-- Trace 2 -->
    <path d="M 310 240 L 370 240 L 410 210 L 440 210" fill="none" stroke="#00f5d4" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="440" cy="210" r="6" fill="#00f5d4" />

    <!-- Trace 3 -->
    <path d="M 295 290 L 360 290 L 400 260 L 430 260" fill="none" stroke="#00f5d4" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="430" cy="260" r="6" fill="#00f5d4" />

    <!-- Trace 4 -->
    <path d="M 285 340 L 340 340 L 380 300 L 410 300" fill="none" stroke="#00f5d4" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="410" cy="300" r="6" fill="#00f5d4" />

    <!-- Trace 5 -->
    <path d="M 275 390 L 320 390 L 360 350" fill="none" stroke="#00f5d4" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="360" cy="350" r="6" fill="#00f5d4" />

    <!-- Star -->
    <path d="M 350 90 Q 350 110 330 110 Q 350 110 350 130 Q 350 110 370 110 Q 350 110 350 90 Z" fill="#ffffff" />
    <path d="M 350 90 L 350 130 M 330 110 L 370 110" stroke="#ffffff" stroke-width="2" />
  </g>
</svg>
